<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>À la une — RiderSkill Production</title>
  <link rel="icon" href="logo avecfond.jpg" />
  <style>
    body{ margin:0;padding:0;font-family:system-ui,-apple-system,sans-serif; background:#0f1014;color:#EDEDED }
    .topbar{position:sticky;top:0;z-index:1000;background:rgba(13,13,13,.9); backdrop-filter:blur(8px);border-bottom:1px solid #1f1f1f}
    .nav{display:flex;align-items:center;justify-content:space-between;min-height:70px;max-width:1400px;margin:0 auto;padding:0 20px}
    .brand{display:flex;align-items:center;gap:10px;text-decoration:none;color:white}
    .brand-avatar{width:32px;height:32px;border-radius:6px}
    .brand span{font-weight:900; font-size: 22px; letter-spacing: -1px;}
    .links{display:flex;gap:10px;align-items:center}
    .btn{padding:10px 16px;background:#1a1a1c;border:1px solid #2a2a2a;border-radius:12px;
      font-weight:800;text-decoration:none;color:white;font-size:12px;transition:0.2s}
    .btn:hover{border-color:#9146FF; transform:translateY(-2px)}
    .section{padding:40px 20px;max-width:1200px;margin:0 auto}
    .panel{background:#161616;border:1px solid #1f1f1f;border-radius:22px;padding:30px}
    .grid{display:grid;gap:20px;grid-template-columns:repeat(auto-fit,minmax(300px,1fr)); margin-top:25px}
    .v-card{background:#131313;border:1px solid #222;border-radius:16px;overflow:hidden;text-decoration:none;color:white;transition:0.3s;display:block}
    .v-card:hover{border-color:#9146FF;transform:translateY(-5px)}
    .v-img{width:100%;aspect-ratio:16/9;background-size:cover;background-position:center}
    .v-info{padding:15px}
    .v-title{font-weight:900;font-size:14px;height:40px;overflow:hidden}
    footer{padding:50px;text-align:center;color:#666;font-weight:800;font-size:12px}
  </style>
</head>
<body>
  <div class="topbar">
    <div class="nav">
      <a class="brand" href="index.html">
        <img class="brand-avatar" src="logo avecfond.jpg" alt="Logo">
        <span>RIDERSKILL</span>
      </a>
      <div class="links">
        <a class="btn" href="index.html">LIVE</a>
        <a class="btn" href="alaune.html" style="border-color:#9146FF">À LA UNE</a>
        <a class="btn" href="https://kick.com/riderskill" target="_blank">KICK</a>
        <a class="btn" href="https://youtube.com/@riderskill" target="_blank">YOUTUBE</a>
        <a class="btn" href="https://discord.gg/nbAZ28Z6jH" target="_blank">DISCORD</a>
      </div>
    </div>
  </div>

  <section class="section">
    <div class="panel">
      <h2 style="margin:0;font-weight:900">⭐ PRODUCTIONS À LA UNE</h2>
      <div class="grid" id="grid-alaune">
        <p>Chargement des productions...</p>
      </div>
    </div>
  </section>

  <footer>© 2026 RIDERSKILL PRODUCTION</footer>

  <script>
    // Chargement des vidéos uniquement
    fetch('data/youtube.json?v=' + Date.now())
      .then(r => r.json())
      .then(data => {
        const items = data.items || data;
        document.getElementById('grid-alaune').innerHTML = items.slice(0, 9).map(v => `
          <a href="${v.url}" target="_blank" class="v-card">
            <div class="v-img" style="background-image:url('${v.cover}')"></div>
            <div class="v-info">
              <div class="v-title">${v.title}</div>
              <div style="font-size:10px;color:#9146FF;font-weight:800;margin-top:10px">PRODUCTION OFFICIELLE 📀</div>
            </div>
          </a>
        `).join('');
      });
  </script>
</body>
</html>
