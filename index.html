<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RiderSkill — Hub Production</title>
    <link rel="icon" href="logo1.png">
    <style>
        :root {
            --bg: #0a0a0b;
            --panel: rgba(20, 20, 22, 0.95);
            --accent: #9146FF;
            --live-green: #53FC18;
            --off-red: #ff4444;
            --text: #ffffff;
            --border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); overflow-x: hidden; }

        /* --- HEADER & STATUS --- */
        header { 
            background: rgba(10, 10, 10, 0.98); border-bottom: 1px solid var(--border); 
            position: sticky; top: 0; z-index: 10000; backdrop-filter: blur(15px);
            padding: 15px 0;
        }
        .nav { display: flex; align-items: center; justify-content: space-between; max-width: 1400px; margin: 0 auto; padding: 0 20px; }
        
        .brand-block { display: flex; align-items: center; gap: 15px; }
        .brand { display: flex; align-items: center; gap: 10px; text-decoration: none; color: white; }
        .brand img { width: 40px; border-radius: 10px; }
        .brand span { font-weight: 900; font-size: 24px; letter-spacing: -1px; }

        /* TON BOUTON ON/OFF ROUGE/VERT */
        .status-indicator {
            display: flex; align-items: center; gap: 8px;
            background: #000; padding: 6px 14px; border-radius: 20px;
            border: 1px solid var(--border); font-size: 11px; font-weight: 900;
        }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--off-red); transition: 0.3s; }
        .status-text { color: var(--off-red); transition: 0.3s; }

        /* Classe active quand tu es en stream */
        .is-live .dot { background: var(--live-green); box-shadow: 0 0 10px var(--live-green); }
        .is-live .status-text { color: var(--live-green); }

        .menu-links { display: flex; gap: 10px; }
        .menu-links a { 
            background: #1a1a1c; border: 1px solid var(--border); padding: 8px 18px; 
            border-radius: 10px; color: white; text-decoration: none; font-size: 13px; font-weight: 700;
        }

        /* --- SETUP BANNER --- */
        .setup-strip {
            background: linear-gradient(90deg, var(--accent), var(--live-green));
            color: black; text-align: center; padding: 10px; font-weight: 900;
            font-size: 12px; margin-bottom: 30px;
        }

        /* --- GRID & CARDS --- */
        .container { max-width: 1400px; margin: 0 auto; padding: 0 20px; }
        .section-title { font-size: 26px; font-weight: 900; margin: 40px 0 20px; display: flex; align-items: center; gap: 12px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; }
        
        .card { 
            background: var(--panel); border-radius: 22px; border: 1px solid var(--border); 
            overflow: hidden; text-decoration: none; color: white; display: block; transition: 0.3s;
        }
        .card:hover { transform: translateY(-8px); border-color: var(--accent); }
        .card-img { width: 100%; aspect-ratio: 16/9; background-size: cover; background-position: center; }
        .card-body { padding: 20px; }
        .card-title { font-size: 14px; font-weight: 900; text-transform: uppercase; margin-bottom: 12px; height: 40px; overflow: hidden; }
        .card-footer { font-size: 10px; color: #777; font-weight: 800; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 12px; }

        #player-twitch { width: 100%; aspect-ratio: 16/9; border-radius: 25px; overflow: hidden; background: #000; margin-bottom: 30px; border: 1px solid var(--border); }
    </style>
</head>
<body>

<header>
    <div class="nav">
        <div class="brand-block">
            <a href="index.html" class="brand">
                <img src="logo1.png" alt="R">
                <span>RIDERSKILL</span>
            </a>
            <div class="status-indicator" id="live-indicator">
                <div class="dot"></div>
                <span class="status-text" id="live-label">OFF</span>
            </div>
        </div>
        <div class="menu-links">
            <a href="index.html">LIVE</a>
            <a href="clips.html">CLIPS</a>
            <a href="alaune.html">À LA UNE</a>
            <a href="https://discord.gg/nbAZ28Z6jH" target="_blank">DISCORD</a>
        </div>
    </div>
</header>

<div class="setup-strip">
    i5-14600KF @ 5.5 GHZ | RTX 5070 TI | 32 GO DDR5 | RIVATUNER STEALTH MODE
</div>

<div class="container">
    <div id="player-twitch"></div>

    <h2 class="section-title">📺 YouTube Production</h2>
    <div id="yt-grid" class="grid"></div>

    <h2 class="section-header" style="margin-top:50px; font-size:26px; font-weight:900;">📱 TikTok Highlights</h2>
    <div id="tk-grid" class="grid" style="margin-top:20px;"></div>
</div>

<script src="https://player.twitch.tv/js/embed/v1.js"></script>
<script>
    // 1. GESTION DU LIVE & STATUS ROUGE/VERT
    const player = new Twitch.Player("player-twitch", {
        channel: "riderskill",
        width: "100%", height: "100%",
        parent: ["riderskill.github.io"]
    });

    player.addEventListener(Twitch.Player.ONLINE, () => {
        document.getElementById('live-indicator').classList.add('is-live');
        document.getElementById('live-label').textContent = "ON";
    });

    player.addEventListener(Twitch.Player.OFFLINE, () => {
        document.getElementById('live-indicator').classList.remove('is-live');
        document.getElementById('live-label').textContent = "OFF";
    });

    // 2. CHARGEMENT COMPLET DES DONNÉES (YouTube & TikTok)
    const v = Date.now();

    // YouTube
    fetch('data/youtube.json?v=' + v)
        .then(r => r.json())
        .then(data => {
            const items = data.items || data;
            document.getElementById('yt-grid').innerHTML = items.slice(0, 8).map(item => `
                <a href="${item.url}" target="_blank" class="card">
                    <div class="card-img" style="background-image: url('${item.cover}')"></div>
                    <div class="card-body">
                        <div class="card-title">${item.title}</div>
                        <div class="card-footer">🔊 RIDERSKILL PRODUCTION • ARCHIVES TOTALES 📀</div>
                    </div>
                </a>
            `).join('');
        });

    // TikTok
    fetch('clips.json?v=' + v)
        .then(r => r.json())
        .then(data => {
            document.getElementById('tk-grid').innerHTML = data.slice(0, 8).map(item => `
                <a href="${item.url}" target="_blank" class="card">
                    <div class="card-img" style="background-image: url('${item.cover}')"></div>
                    <div class="card-body">
                        <div class="card-title">${item.title}</div>
                        <div class="card-footer">📱 TIKTOK HIGHLIGHT • PRODUCTION 💿</div>
                    </div>
                </a>
            `).join('');
        });
</script>
</body>
</html>
