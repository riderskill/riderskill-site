<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RiderSkill — Site Officiel</title>
    <link rel="icon" href="logo1.png">
    
    <style>
        :root {
            --bg: #0d0d0d;
            --panel: rgba(25, 25, 25, 0.85);
            --accent: #9146FF;
            --text: #ffffff;
            --muted: #b0b0b0;
            --border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; transition: all 0.2s ease; }
        body {
            margin: 0; padding: 0; background: var(--bg); color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(rgba(0,0,0,0.9), rgba(0,0,0,0.9)), url('https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=1920');
            background-size: cover; background-attachment: fixed;
        }

        .container { width: 100%; max-width: 1300px; margin: 0 auto; padding: 0 20px; }

        /* HEADER */
        header { background: rgba(10, 10, 10, 0.95); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000; padding: 15px 0; }
        .nav { display: flex; align-items: center; justify-content: space-between; }
        .brand { display: flex; align-items: center; gap: 10px; text-decoration: none; color: white; }
        .brand img { width: 35px; height: 35px; border-radius: 8px; }
        .menu-btns { display: flex; gap: 8px; flex-wrap: wrap; }
        .menu-btns a { background: #1a1a1a; padding: 8px 14px; border-radius: 8px; font-size: 13px; font-weight: 700; text-decoration: none; color: white; border: 1px solid var(--border); }
        .menu-btns a:hover { border-color: var(--accent); background: #222; }

        /* BANDUEAU SETUP */
        .setup-bar { background: linear-gradient(90deg, #9146FF, #53FC18); color: black; padding: 8px; text-align: center; font-weight: 900; font-size: 12px; margin-bottom: 30px; border-radius: 0 0 15px 15px; }

        /* TITRES SECTIONS */
        .section-header { font-size: 24px; font-weight: 900; margin: 50px 0 20px; display: flex; align-items: center; gap: 10px; }

        /* GRILLES */
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }

        /* CARTES "PRODUCTION" (Capture 2) */
        .card { background: var(--panel); border-radius: 18px; border: 1px solid var(--border); overflow: hidden; text-decoration: none; color: white; display: block; }
        .card:hover { transform: translateY(-5px); border-color: var(--accent); }
        .card-thumb { width: 100%; aspect-ratio: 16/9; background-size: cover; background-position: center; background-color: #000; }
        .card-body { padding: 15px; }
        .card-title { font-size: 14px; font-weight: 800; text-transform: uppercase; margin-bottom: 10px; display: block; height: 40px; overflow: hidden; }
        .card-footer { font-size: 11px; color: var(--muted); font-weight: 700; border-top: 1px solid var(--border); padding-top: 10px; display: flex; align-items: center; gap: 5px; }

        /* VOD IFRAME FIX */
        .vod-card { background: var(--panel); border-radius: 18px; border: 1px solid var(--border); overflow: hidden; }
        iframe { border: none; width: 100%; }

        footer { text-align: center; padding: 80px 0; color: var(--muted); font-weight: 600; }
    </style>
</head>
<body>

<header>
    <div class="container nav">
        <a href="index.html" class="brand">
            <img src="logo1.png" alt="RiderSkill">
            <span style="font-weight: 900;">RiderSkill</span>
        </a>
        <div class="menu-btns">
            <a href="index.html">Live</a>
            <a href="clips.html">Clips</a>
            <a href="alaune.html">À la une</a>
            <a href="https://twitch.tv/riderskill" target="_blank">Twitch</a>
            <a href="https://kick.com/riderskill" target="_blank">Kick</a>
            <a href="https://youtube.com/@riderskill" target="_blank">YouTube</a>
            <a href="https://tiktok.com/@riderskill" target="_blank">TikTok</a>
            <a href="https://discord.gg/nbAZ28Z6jH" target="_blank">Discord</a>
        </div>
    </div>
</header>

<div class="container">
    <div class="setup-bar">
        i5-14600KF @ 5.5 GHz | RTX 5070 Ti | 32 Go DDR5 | STEALTH MODE 64-BIT
    </div>

    <div style="background: var(--panel); padding: 20px; border-radius: 25px; border: 1px solid var(--border); margin-bottom: 40px;">
        <div id="twitch-player" style="width:100%; aspect-ratio:16/9; border-radius:15px; overflow:hidden;"></div>
    </div>

    <div class="section-header">📺 Dernières Vidéos YouTube</div>
    <div id="youtube-grid" class="video-grid"></div>

    <div class="section-header">📱 TikTok Highlights</div>
    <div id="tiktok-grid" class="video-grid"></div>

    <div class="section-header">🎬 VOD Twitch Récentes</div>
    <div id="vod-grid" class="video-grid"></div>
</div>

<footer>
    © 2026 RiderSkill Production — RivaTuner Stealth Mode Active
</footer>

<script src="https://player.twitch.tv/js/embed/v1.js"></script>
<script>
    const ts = Date.now();

    // Init Twitch Player
    new Twitch.Player("twitch-player", { channel: "riderskill", width: "100%", height: "100%", parent: ["riderskill.github.io"] });

    // Charger YouTube (data/youtube.json)
    fetch('data/youtube.json?v=' + ts).then(r => r.json()).then(data => {
        const items = data.items || data;
        document.getElementById('youtube-grid').innerHTML = items.slice(0, 4).map(y => `
            <a href="${y.url}" target="_blank" class="card">
                <div class="card-thumb" style="background-image: url('${y.cover}')"></div>
                <div class="card-body">
                    <span class="card-title">${y.title}</span>
                    <div class="card-footer">🔊 RIDERSKILL PRODUCTION • ARCHIVES 📀</div>
                </div>
            </a>
        `).join('');
    });

    // Charger TikTok (clips.json)
    fetch('clips.json?v=' + ts).then(r => r.json()).then(data => {
        document.getElementById('tiktok-grid').innerHTML = data.slice(0, 4).map(t => `
            <a href="${t.url}" target="_blank" class="card">
                <div class="card-thumb" style="background-image: url('${t.cover}')"></div>
                <div class="card-body">
                    <span class="card-title">${t.title || 'TikTok Highlight'}</span>
                    <div class="card-footer">📱 TIKTOK PRODUCTION</div>
                </div>
            </a>
        `).join('');
    }).catch(err => console.error("Erreur TikTok:", err));

    // Charger VOD (vod.json)
    fetch('vod.json?v=' + ts).then(r => r.json()).then(data => {
        document.getElementById('vod-grid').innerHTML = data.slice(0, 4).map(v => {
            const videoId = v.url.split('/').pop();
            return `
                <div class="vod-card">
                    <iframe src="https://player.twitch.tv/?video=${videoId}&parent=riderskill.github.io&autoplay=false" height="200" width="100%"></iframe>
                    <div style="padding:10px; font-size:12px; font-weight:bold; text-align:center;">🎬 REPLAY TWITCH</div>
                </div>
            `;
        }).join('');
    }).catch(err => console.error("Erreur VOD:", err));
</script>
</body>
</html>
