<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>RiderSkill — Streamer FR</title>
<link rel="icon" href="logo1.png" />
<meta name="theme-color" content="#0D0D0D" />

<style>
:root{
  --bg:#0f1014; --panel:#161616; --text:#EDEDED; --muted:#9aa0a6; --ok:#22c55e; --ko:#ef4444;
  --twitch:#9146FF; --kick:#53FC18;
}
*{box-sizing:border-box}
body{
  margin:0; padding:0; min-height:100vh; color:var(--text);
  font-family:system-ui,-apple-system,sans-serif;
  background: radial-gradient(circle at 50% 15%, rgba(255,255,255,0.05) 0%, #0f1014 100%);
  background-attachment: fixed;
}
a{color:inherit;text-decoration:none}
.container{width:100%;max-width:1120px;margin:0 auto;padding:0 16px}
.section{padding:26px 0}

/* Topbar */
.topbar{position:sticky;top:0;z-index:1000;background:rgba(13,13,13,0.9);backdrop-filter:blur(8px);border-bottom:1px solid #222}
.nav{display:flex;align-items:center;justify-content:space-between;min-height:64px}
.brand{display:flex;align-items:center;gap:12px}
.brand-avatar{width:35px;height:35px;border-radius:8px;border:1px solid #333}
.status-dot{width:10px;height:10px;border-radius:50%;background:var(--ko)}
.links{display:flex;gap:10px;flex-wrap:wrap}
.btn{padding:8px 12px;background:#1a1a1a;border:1px solid #333;border-radius:10px;font-weight:bold;font-size:14px}
.btn:hover{background:#252525;border-color:var(--twitch)}

/* Grid Layouts */
.panel{background:#161616;border:1px solid #222;border-radius:18px;padding:20px;margin-bottom:20px}
.live-grid{display:grid;grid-template-columns:2fr 1fr;gap:15px}
.vod-grid, .social-grid{display:grid;grid-template-columns:repeat(auto-fill, minmax(250px, 1fr));gap:15px}
iframe{width:100%;border-radius:12px;border:none;background:#000}

@media (max-width:850px){ .live-grid{grid-template-columns:1fr} }
</style>
</head>
<body>

<div class="topbar">
  <div class="nav container">
    <a class="brand" href="index.html">
      <img class="brand-avatar" src="logo1.png" alt="Logo">
      <span style="font-weight:900">RiderSkill</span>
      <div id="statusDot" class="status-dot"></div>
      <span id="statusLabel" style="font-size:12px;font-weight:bold;color:var(--ko)">OFF</span>
    </a>
    <div class="links">
      <a class="btn" href="index.html">Live</a>
      <a class="btn" href="clips.html">Clips</a>
      <a class="btn" href="https://www.twitch.tv/riderskill" target="_blank">Twitch</a>
      <a class="btn" href="https://kick.com/riderskill" target="_blank">Kick</a>
      <a class="btn" href="https://www.youtube.com/@riderskill" target="_blank">YouTube</a>
    </div>
  </div>
</div>

<div class="container">
  <header class="section">
    <div class="panel">
      <h1 style="margin:0">Le show. Le game. <span style="color:var(--twitch)">La musique.</span></h1>
      <p style="color:var(--muted)">Setup: i5-14600KF | RTX 5070 Ti | Vibes 24/7</p>
    </div>
  </header>

  <section class="live-grid">
    <div class="panel" style="padding:10px">
      <iframe src="https://player.twitch.tv/?channel=riderskill&parent=riderskill.github.io" height="450" allowfullscreen></iframe>
    </div>
    <div class="panel" style="padding:10px">
      <iframe src="https://www.twitch.tv/embed/riderskill/chat?parent=riderskill.github.io" height="450"></iframe>
    </div>
  </section>

  <section class="section">
    <h2>🎬 Dernières VOD & YouTube</h2>
    <div id="vodGrid" class="vod-grid"></div>
  </section>
</div>

<footer style="text-align:center; padding:40px; color:var(--muted)">
  © 2026 RiderSkill — Propulsé par la commu
</footer>

<script>
/* Gestion du Statut Live */
function setStatus(online){
  document.getElementById('statusDot').style.background = online ? 'var(--ok)' : 'var(--ko)';
  document.getElementById('statusLabel').textContent = online ? 'LIVE' : 'OFF';
  document.getElementById('statusLabel').style.color = online ? 'var(--ok)' : 'var(--ko)';
}

/* Chargement VOD & YouTube Automatique */
const bust = Date.now();
fetch('vod.json?v='+bust).then(r=>r.json()).then(data=>{
  const grid = document.getElementById('vodGrid');
  grid.innerHTML = data.slice(0,6).map(v => {
    const id = v.url.split('/').pop();
    return `<div class="panel" style="padding:5px">
      <iframe src="https://player.twitch.tv/?video=${id}&parent=riderskill.github.io&autoplay=false" height="180"></iframe>
    </div>`;
  }).join('');
}).catch(() => {
  document.getElementById('vodGrid').innerHTML = "<p class='muted'>Mise à jour des clips en cours...</p>";
});

/* Détection Live */
const player = new Twitch.Player("statusDot", {channel: "riderskill", width:0, height:0, parent:["riderskill.github.io"]});
player.addEventListener(Twitch.Player.ONLINE, () => setStatus(true));
player.addEventListener(Twitch.Player.OFFLINE, () => setStatus(false));
</script>
</body>
</html>
