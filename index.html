<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RiderSkill — Site Officiel</title>
    <link rel="icon" href="logo1.png">
    <style>
        :root {
            --bg: #0a0a0b;
            --panel: #111112;
            --accent: #9146FF;
            --kick: #53FC18;
            --text: #ffffff;
            --border: rgba(255, 255, 255, 0.1);
        }

        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; }

        /* --- HEADER (CONFORME À TON IMAGE) --- */
        header { 
            background: #000; padding: 15px 0; border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 9999;
        }
        .nav { display: flex; align-items: center; justify-content: space-between; max-width: 1400px; margin: 0 auto; padding: 0 20px; }
        
        .brand-area { display: flex; align-items: center; gap: 10px; }
        .twitch-logo { background: #fff; border-radius: 4px; padding: 4px; display: flex; align-items: center; }
        .twitch-logo img { width: 24px; height: 24px; }
        .brand-name { font-weight: 900; font-size: 20px; text-decoration: none; color: white; }
        
        /* Bouton ON/OFF rouge/vert */
        .status-dot { width: 12px; height: 12px; border-radius: 50%; background: #ff4444; margin-left: 5px; box-shadow: 0 0 10px rgba(255,68,68,0.5); }
        .is-live .status-dot { background: #ff0000; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        /* Boutons de navigation */
        .menu-links { display: flex; gap: 8px; align-items: center; }
        .btn { 
            background: #1a1a1c; border: 1px solid #2a2a2a; color: white; 
            padding: 8px 16px; border-radius: 12px; font-weight: 800; font-size: 13px;
            text-decoration: none; display: flex; align-items: center; gap: 8px; transition: 0.2s;
        }
        .btn:hover { background: #222; border-color: #444; transform: translateY(-2px); }
        .btn.active { background: #252528; border-color: #444; }
        .btn img { width: 16px; height: 16px; }

        /* --- SETUP STRIP --- */
        .setup-banner {
            background: linear-gradient(90deg, #9146FF, #53FC18);
            color: #000; text-align: center; padding: 8px; font-weight: 900; font-size: 11px;
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 30px 20px; }
        #player-twitch { width: 100%; aspect-ratio: 16/9; border-radius: 20px; overflow: hidden; border: 1px solid var(--border); }
    </style>
</head>
<body>

<header>
    <div class="nav">
        <div class="brand-area" id="live-indicator">
            <div class="twitch-logo"><img src="https://upload.wikimedia.org/wikipedia/commons/d/d3/Twitch_Glitch_Logo_Purple.svg" alt="T"></div>
            <a href="index.html" class="brand-name">RiderSkill</a>
            <div class="status-dot"></div>
        </div>

        <div class="menu-links">
            <a href="index.html" class="btn active">Live</a>
            <a href="alaune.html" class="btn">À la une</a>
            <a href="https://twitch.tv/riderskill" target="_blank" class="btn"><img src="https://cdn-icons-png.flaticon.com/512/5968/5968819.png"> Twitch</a>
            <a href="https://kick.com/riderskill" target="_blank" class="btn" style="color:#53FC18;"><img src="https://upload.wikimedia.org/wikipedia/commons/a/ad/Kick_logo.svg"> Kick</a>
            <a href="https://youtube.com/@riderskill" target="_blank" class="btn"><img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png"> YouTube</a>
            <a href="https://tiktok.com/@riderskill" target="_blank" class="btn"><img src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png"> TikTok</a>
            <a href="https://discord.gg/nbAZ28Z6jH" target="_blank" class="btn"><img src="https://cdn-icons-png.flaticon.com/512/5968/5968756.png"> Discord</a>
        </div>
    </div>
</header>

<div class="setup-banner">
    i5-14600KF @ 5.5 GHZ | RTX 5070 TI | 32 GO DDR5 | STEALTH MODE ACTIVE
</div>

<div class="container">
    <div id="player-twitch"></div>
</div>

<script src="https://player.twitch.tv/js/embed/v1.js"></script>
<script>
    const player = new Twitch.Player("player-twitch", {
        channel: "riderskill", width: "100%", height: "100%", parent: ["riderskill.github.io"]
    });

    player.addEventListener(Twitch.Player.ONLINE, () => {
        document.getElementById('live-indicator').classList.add('is-live');
    });

    player.addEventListener(Twitch.Player.OFFLINE, () => {
        document.getElementById('live-indicator').classList.remove('is-live');
    });
</script>
</body>
</html>
